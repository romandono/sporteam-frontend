services:
  - type: web
    name: sporteam-frontend
    runtime: static
    buildCommand: npm ci && npm run build -- --configuration production
    staticPublishPath: ./dist/sporteam-frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
        sync: false
      - key: API_BASE_URL
        sync: false
    region: oregon
    branch: main
    autoDeploy: true